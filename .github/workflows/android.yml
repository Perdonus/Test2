name: Android Debug

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Run unit tests
        id: unit-tests
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew -Pkotlin.compiler.execution.strategy=in-process testDebugUnitTest --stacktrace --info | tee gradle-test.log

      - name: Publish test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r34-native-test-diagnostics
          path: |
            gradle-test.log
            app/build/reports/tests/**
            app/build/test-results/**
            build/reports/**

      - name: Summarize unit test result
        if: always()
        run: |
          if [ "${{ steps.unit-tests.outcome }}" = "success" ]; then
            echo "Unit tests passed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Unit tests failed. Download the 'r34-native-test-diagnostics' artifact for Gradle output and reports." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Gradle log tail" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          clean_log_file="$(mktemp)"
          if [ -f gradle-test.log ]; then
            sed -r 's/\x1B\[[0-9;]*[[:alpha:]]//g' gradle-test.log > "$clean_log_file"
            tail -n 120 "$clean_log_file" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "gradle-test.log was not created." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          key_errors="$(grep -E '(^e: )|( error: )|Unresolved reference|Compilation error|Execution failed for task|FAILURE: Build failed with an exception\\.|Caused by:|What went wrong' "$clean_log_file" | tail -n 20 || true)"
          if [ -n "$key_errors" ]; then
            echo "### Key error lines" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$key_errors" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$key_errors" | head -n 5 | while IFS= read -r line; do
              echo "::error::$line"
            done
          elif [ -f gradle-test.log ]; then
            echo "### Last 25 log lines" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 25 "$clean_log_file" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 20 "$clean_log_file" | while IFS= read -r line; do
              [ -n "$line" ] || continue
              sanitized="$(printf '%s' "$line" | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
              echo "::error::$sanitized"
            done
          fi
          if find app/build/test-results -name '*.xml' -type f | grep -q .; then
            failures=$(grep -Rho 'failures=\"[0-9]\\+\"' app/build/test-results | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')
            errors=$(grep -Rho 'errors=\"[0-9]\\+\"' app/build/test-results | sed 's/[^0-9]//g' | awk '{s+=$1} END {print s+0}')
            echo "Reported failures: ${failures}, errors: ${errors}." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Unit tests failed with ${failures} failures and ${errors} errors. See artifact r34-native-test-diagnostics."
          else
            echo "No XML test reports were generated, so the failure likely happened during Kotlin/Compose/Gradle compilation before test execution." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Gradle failed before XML test reports were generated. See artifact r34-native-test-diagnostics."
          fi

      - name: Assemble debug APK
        id: assemble-debug
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew -Pkotlin.compiler.execution.strategy=in-process assembleDebug --stacktrace --info | tee gradle-assemble.log

      - name: Upload debug APK
        if: always() && steps.assemble-debug.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: r34-native-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish assemble diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r34-native-assemble-diagnostics
          path: |
            gradle-assemble.log
            app/build/reports/**
            build/reports/**

      - name: Fail workflow on build errors
        if: always()
        run: |
          if [ "${{ steps.unit-tests.outcome }}" = "failure" ]; then
            echo "::error::Unit tests failed. See r34-native-test-diagnostics."
            exit 1
          fi
          if [ "${{ steps.assemble-debug.outcome }}" = "failure" ]; then
            echo "::error::assembleDebug failed."
            exit 1
          fi
